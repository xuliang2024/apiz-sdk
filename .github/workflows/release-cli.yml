name: Release CLI (goreleaser)

on:
  push:
    tags:
      - "cli-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label to publish to R2 (e.g. v0.1.0)"
        required: false
        default: ""

permissions:
  contents: write

defaults:
  run:
    working-directory: cli

jobs:
  release:
    name: Cross-compile + publish (GitHub + R2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: cli/go.mod
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install boto3 (for R2 uploader)
        run: pip install boto3
      - name: Test
        run: go test -race ./...
      - name: Strip cli- prefix for goreleaser semver
        if: startsWith(github.ref_name, 'cli-')
        run: echo "GORELEASER_CURRENT_TAG=${GITHUB_REF_NAME#cli-}" >> $GITHUB_ENV
      - name: goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          # --skip=validate: tag is `cli-vX.Y.Z`, GORELEASER_CURRENT_TAG strips the
          # `cli-` prefix so the GitHub Release name is clean (vX.Y.Z), but git
          # only knows the prefixed tag. Skipping validate avoids the
          # "tag X was not made against commit Y" mismatch.
          args: release --clean --skip=validate
          workdir: cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
      - name: Upload to Cloudflare R2 (apiz.ai/cli)
        # Soft-fail: only runs when goreleaser produced artifacts, and won't
        # turn the whole job red if R2_* secrets aren't configured yet.
        if: always() && hashFiles('cli/dist/checksums.txt') != ''
        continue-on-error: true
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_CLI_BUCKET: ${{ vars.R2_CLI_BUCKET || 'apiz-cli' }}
        run: |
          if [ -z "$R2_ACCOUNT_ID" ]; then
            echo "::warning::R2_ACCOUNT_ID not set; skipping apiz.ai/cli mirror upload"
            exit 0
          fi
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ]; then
            version="${GITHUB_REF_NAME#cli-}"  # cli-v0.1.0 → v0.1.0
          fi
          python scripts/deploy_cli_to_r2.py --dist dist --version "$version"

  deploy-worker:
    name: Deploy apiz-cli Worker (Cloudflare)
    runs-on: ubuntu-latest
    needs: release
    if: ${{ !github.event.inputs.skip_worker }}
    continue-on-error: true
    defaults:
      run:
        working-directory: cli/cloudflare
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN not set; skipping Worker deploy"
            exit 0
          fi
          npx -y wrangler@latest deploy
