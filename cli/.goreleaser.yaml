version: 2

project_name: apiz

before:
  hooks:
    - go mod tidy

# After publishing to GitHub, push the same archives + install.sh into the
# `apiz-cli` Cloudflare R2 bucket so `curl -fsSL https://apiz.ai/cli | sh`
# works. CI in release-cli.yml runs deploy_cli_to_r2.py for us, so we don't
# trigger the script here too. (Local snapshots can call it manually.)

builds:
  - id: apiz
    main: .
    binary: apiz
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/apiz-ai/apiz-cli/cmd.Version={{.Version}}

archives:
  - id: apiz
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: apiz
    repository:
      owner: apiz-ai
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: apiz-bot
      email: bot@apiz.ai
    homepage: https://apiz.ai
    description: Single-binary CLI for the apiz.ai AI generation platform
    license: Apache-2.0
    test: |
      system "#{bin}/apiz", "--version"

scoops:
  - name: apiz
    repository:
      owner: apiz-ai
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    commit_author:
      name: apiz-bot
      email: bot@apiz.ai
    homepage: https://apiz.ai
    description: Single-binary CLI for the apiz.ai AI generation platform
    license: Apache-2.0
